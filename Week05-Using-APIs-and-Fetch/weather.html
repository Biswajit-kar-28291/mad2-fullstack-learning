<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Card App</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
</head>
<body class="bg-light">
  <div id="app" class="container py-4">
    <h2 class="text-center mb-4">Weather Card App</h2>

    <div class="row justify-content-center mb-4">
      <div class="col-md-6">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            placeholder="Add city"
            v-model="newCity"
            @keyup.enter="addCity"
          />
          <button class="btn btn-primary" @click="addCity">Add</button>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-4" v-for="city in cities" :key="city.name">
        <city-card :c="city" @remove-city="removeCity"></city-card>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <script src="weather.js"></script>
</body>
</html>
